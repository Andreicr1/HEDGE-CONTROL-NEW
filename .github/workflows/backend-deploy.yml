name: Backend CI/CD (App Service)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

env:
  ACR_NAME: alcasthedgeacr
  ACR_LOGIN_SERVER: alcasthedgeacr.azurecr.io
  IMAGE_NAME: hedge-backend
  RESOURCE_GROUP: Alcast-Hedge
  WEBAPP_NAME: alcast-hedge-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
        run: |
          cd backend
          pytest -q

  build_and_deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile .

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_LOGIN_SERVER }}

          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }}

      - name: Wait for deployment
        run: |
          echo "Waiting 30s for container startup..."
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.WEBAPP_NAME }}.azurewebsites.net/health || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Health check did not return 200 after 5 attempts"
