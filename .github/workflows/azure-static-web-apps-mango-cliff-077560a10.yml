name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps-mango-cliff-077560a10.yml"
      - ".github/workflows/swa-deploy.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Configure API base URL
        shell: bash
        run: |
          set -euo pipefail
          API_BASE_URL="${API_BASE_URL:-/api}"
          python3 - <<'PY'
          import os
          from pathlib import Path
          api_base_url = os.environ.get("API_BASE_URL", "").strip()
          if not api_base_url:
            raise SystemExit("API_BASE_URL is empty")
          p = Path("frontend/webapp/util/config.js")
          data = p.read_text(encoding="utf-8")
          data = data.replace("__HC_API_BASE_URL__", api_base_url)
          p.write_text(data, encoding="utf-8")
          print(f"Configured apiBaseUrl={api_base_url}")
          PY
        env:
          API_BASE_URL: ${{ vars.HC_API_BASE_URL || '/api' }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "frontend/webapp"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: "frontend/webapp"
