name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend-check:
    name: "Frontend: svelte-check + TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run check

  frontend-test:
    name: "Frontend: Vitest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run test

  frontend-build:
    name: "Frontend: Static Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run build

  backend-test:
    name: "Backend: pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SCHEDULER_DISABLED: "1"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov httpx
      - run: pytest -v

  schema-drift:
    # This job requires the backend to be running to fetch /openapi.json.
    # In a full setup, use docker-compose to start the backend first, or
    # run this as a separate workflow with service containers.
    # For now it is best-effort — failures do not block the pipeline.
    name: "Schema Drift Check"
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - name: Check schema drift
        run: bash scripts/check-schema-drift.sh
        env:
          API_BASE_URL: http://localhost:8000
