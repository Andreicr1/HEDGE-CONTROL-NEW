target-version = "py311"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "PLW",   # pylint warnings
    "RUF",   # ruff-specific
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function call in default argument (FastAPI Depends pattern)
]

[lint.per-file-ignores]
"tests/**" = ["B", "SIM"]
"alembic/**" = ["E", "F", "UP"]

[format]
quote-style = "double"
indent-style = "space"
