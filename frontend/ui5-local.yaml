specVersion: "4.0"
metadata:
  name: hedgecontrol
type: application
framework:
  name: SAPUI5
  version: 1.136.0
  libraries:
    - name: sap.m
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.ui.comp
    - name: sap.ui.generic.app
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /counterparties
            url: http://localhost:8000
          - path: /orders
            url: http://localhost:8000
          - path: /exposures
            url: http://localhost:8000
          - path: /deals
            url: http://localhost:8000
          - path: /contracts
            url: http://localhost:8000
          - path: /linkages
            url: http://localhost:8000
          - path: /rfqs
            url: http://localhost:8000
          - path: /cashflow
            url: http://localhost:8000
          - path: /pl
            url: http://localhost:8000
          - path: /scenario
            url: http://localhost:8000
          - path: /audit
            url: http://localhost:8000
          - path: /market-data
            url: http://localhost:8000
          - path: /mtm
            url: http://localhost:8000
          - path: /webhooks
            url: http://localhost:8000
          - path: /finance
            url: http://localhost:8000
          - path: /health
            url: http://localhost:8000
          - path: /metrics
            url: http://localhost:8000
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: hedgecontrol
        ui5Theme: sap_horizon
