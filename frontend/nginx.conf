server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compression ──────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   256;
    gzip_comp_level   5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health-check (Azure Container Apps) ──────────────────────
    location = /healthz {
        access_log  off;
        return 200  'ok';
        add_header  Content-Type text/plain;
    }

    # ── Cache: long-lived versioned/hashed resources ─────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
        expires           7d;
        add_header        Cache-Control "public, immutable";
        try_files         $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Do not log favicon misses ────────────────────────────────
    location = /favicon.ico {
        access_log  off;
        log_not_found  off;
    }

    # ── Error pages ──────────────────────────────────────────────
    error_page  404              /index.html;
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}
