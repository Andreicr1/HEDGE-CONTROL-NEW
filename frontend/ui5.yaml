specVersion: "4.0"
metadata:
  name: hedgecontrol
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /counterparties
            url: http://localhost:8000
          - path: /orders
            url: http://localhost:8000
          - path: /exposures
            url: http://localhost:8000
          - path: /deals
            url: http://localhost:8000
          - path: /contracts
            url: http://localhost:8000
          - path: /linkages
            url: http://localhost:8000
          - path: /rfqs
            url: http://localhost:8000
          - path: /cashflow
            url: http://localhost:8000
          - path: /pl
            url: http://localhost:8000
          - path: /scenario
            url: http://localhost:8000
          - path: /audit
            url: http://localhost:8000
          - path: /market-data
            url: http://localhost:8000
          - path: /mtm
            url: http://localhost:8000
          - path: /webhooks
            url: http://localhost:8000
          - path: /finance
            url: http://localhost:8000
          - path: /health
            url: http://localhost:8000
          - path: /metrics
            url: http://localhost:8000
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: hedgecontrol
        ui5Theme: sap_horizon
